<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bell Sekolah{% endblock %} — Bell System</title>
  <meta name="description" content="Sistem bel sekolah otomatis berbasis Armbian Linux dengan Web UI.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.1">
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon" id="brandIcon">🔔</div>
      <div class="brand-text">
        <span class="brand-name">Bell System</span>
        <span class="brand-sub">Sekolah Otomatis</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard') }}"
         class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}"
         id="nav-dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </a>
      <a href="{{ url_for('jadwal_page') }}"
         class="nav-item {% if request.endpoint == 'jadwal_page' %}active{% endif %}"
         id="nav-jadwal">
        <span class="nav-icon">📅</span><span>Jadwal Bel</span>
      </a>
      <a href="{{ url_for('audio_page') }}"
         class="nav-item {% if request.endpoint == 'audio_page' %}active{% endif %}"
         id="nav-audio">
        <span class="nav-icon">🎵</span><span>Audio</span>
      </a>
      <a href="{{ url_for('pengaturan_page') }}"
         class="nav-item {% if request.endpoint == 'pengaturan_page' %}active{% endif %}"
         id="nav-pengaturan">
        <span class="nav-icon">⚙️</span><span>Pengaturan</span>
      </a>
    </nav>

    <div class="sidebar-controls">
      <div class="volume-section">
        <span class="control-label">🔊</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider">
        <span id="volumeValue" class="volume-value">80%</span>
      </div>
      <button class="btn-stop" id="btnStop" onclick="stopAudio()">⏹ Stop Audio</button>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="main-content">
    <div class="content-wrapper">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="{{ url_for('static', filename='js/app.js') }}?v=1.1"></script>
{% block scripts %}{% endblock %}
</body>
</html>
